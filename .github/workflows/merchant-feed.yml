name: Google Merchant Feed

on:
  schedule:
    # Runs every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch: # Manual trigger

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install @supabase/supabase-js

      - name: Generate feed
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: node scripts/generate-merchant-feed.js

      - name: Upload feed via SFTP
        uses: wangyucode/sftp-upload-action@v2.0.4
        with:
          host: ${{ secrets.GMC_SFTP_HOST }}
          port: ${{ secrets.GMC_SFTP_PORT }}
          username: ${{ secrets.GMC_SFTP_USERNAME }}
          password: ${{ secrets.GMC_SFTP_PASSWORD }}
          localDir: ./output/
          remoteDir: /
